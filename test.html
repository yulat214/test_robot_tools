<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ROS 2 Browser Pub/Sub Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        #status { font-weight: bold; color: orange; }
        #messages { height: 200px; overflow-y: scroll; border: 1px solid #eee; background: #f9f9f9; padding: 10px; }
        input { padding: 8px; width: 70%; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>ROS 2 Browser Pub/Sub Demo</h2>
    <p>Status: <span id="status">Connecting...</span></p>

    <div class="box">
        <h3>Talker (Publisher)</h3>
        <input type="text" id="msgInput" value="Hello ROS 2!" placeholder="メッセージを入力">
        <button onclick="publishMessage()">Publish</button>
    </div>

    <div class="box">
        <h3>Listener (Subscriber)</h3>
        <p>Topic: <code>/chatter</code></p>
        <div id="messages"></div>
    </div>
</div>

<script>
    // --- 1. ROSへの接続設定 ---
    const ros = new ROSLIB.Ros({
        url : 'ws://localhost:9090' // Dockerのポート
    });
    const statusSpan = document.getElementById('status');

    ros.on('connection', function() {
        console.log('Connected to websocket server.');
        statusSpan.innerText = 'Connected';
        statusSpan.style.color = 'green';
    });

    ros.on('error', function(error) {
        console.log('Error connecting to websocket server: ', error);
        statusSpan.innerText = 'Error';
        statusSpan.style.color = 'red';
    });

    ros.on('close', function() {
        console.log('Connection to websocket server closed.');
        statusSpan.innerText = 'Closed';
        statusSpan.style.color = 'gray';
    });

    // --- 2. トピックの定義 ---
    // 送信・受信ともに同じトピック '/chatter' を使用します
    const chatterTopic = new ROSLIB.Topic({
        ros : ros,
        name : '/chatter',
        messageType : 'std_msgs/String'
    });

    // --- 3. Listener (Subscribe) の処理 ---
    chatterTopic.subscribe(function(message) {
        console.log('Received message on ' + chatterTopic.name + ': ' + message.data);
        
        // 画面に追記する処理
        const msgDiv = document.getElementById('messages');
        const newMessage = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        newMessage.innerText = `[${time}] ${message.data}`;
        msgDiv.insertBefore(newMessage, msgDiv.firstChild); // 新しいものを上に
    });

    // --- 4. Talker (Publish) の処理 ---
    function publishMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value;

        const msg = new ROSLIB.Message({
            data : text
        });

        chatterTopic.publish(msg);
        console.log('Published: ' + text);
    }
</script>

</body>
</html>
